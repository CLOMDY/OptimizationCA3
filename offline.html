<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - TechVista</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem}
        .offline-card{max-width:450px}
        .offline-icon{font-size:5rem;margin-bottom:1.5rem}
        h1{font-size:2.5rem;font-weight:800;margin-bottom:1rem}
        p{color:rgba(255,255,255,.7);font-size:1.1rem;line-height:1.7;margin-bottom:2rem}
        .retry-btn{display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:.9rem 2rem;border-radius:50px;font-size:1rem;font-weight:600;cursor:pointer;border:none;transition:transform .3s}
        .retry-btn:hover{transform:translateY(-3px)}
        .cached-links{margin-top:2rem}
        .cached-links h3{font-size:1rem;color:rgba(255,255,255,.6);margin-bottom:1rem}
        .cached-links a{display:inline-block;margin:.3rem;padding:.4rem 1rem;background:rgba(255,255,255,.1);border-radius:50px;font-size:.85rem;color:rgba(255,255,255,.8);text-decoration:none}
        .cached-links a:hover{background:rgba(102,126,234,.4)}
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="offline-icon">📡</div>
        <h1>You're Offline</h1>
        <p>It seems you've lost your internet connection. Don't worry — some pages may still be available from our cache.</p>
        <button class="retry-btn" onclick="window.location.reload()">Try Again →</button>
        <div class="cached-links">
            <h3>Try these cached pages:</h3>
            <a href="/index.html">Home</a>
            <a href="/about.html">About</a>
            <a href="/services.html">Services</a>
            <a href="/portfolio.html">Portfolio</a>
            <a href="/contact.html">Contact</a>
        </div>
    </div>
</body>
</html>
